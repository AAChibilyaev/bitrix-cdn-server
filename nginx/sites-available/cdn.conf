# NGINX конфигурация для CDN сервера
# Файл: /etc/nginx/sites-available/cdn.conf

server {
    listen 80;
    listen [::]:80;
    server_name cdn.yourdomain.ru;
    
    # Редирект на HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cdn.yourdomain.ru;

    # SSL настройки (будут добавлены certbot)
    # ssl_certificate /etc/letsencrypt/live/cdn.yourdomain.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cdn.yourdomain.ru/privkey.pem;

    # Корневая директория - примонтированная папка Битрикс
    root /mnt/bitrix;

    # Логи
    access_log /var/log/nginx/cdn.access.log;
    error_log /var/log/nginx/cdn.error.log;

    # Кеш браузера для статики
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Обработка изображений с поддержкой WebP
    location ~* ^(.+)\.(jpg|jpeg|png)$ {
        # Путь к оригинальному файлу
        set $original_file $1.$2;
        set $webp_file /var/cache/webp$1.$2.webp;
        
        # Проверка поддержки WebP в браузере
        set $webp_support 0;
        if ($http_accept ~* "image/webp") {
            set $webp_support 1;
        }

        # Логика отдачи файлов
        location ~ \.jpg$ {
            try_files $webp_file @generate_webp;
        }
        
        location ~ \.jpeg$ {
            try_files $webp_file @generate_webp;
        }
        
        location ~ \.png$ {
            try_files $webp_file @generate_webp;
        }
    }

    # Генерация WebP при отсутствии в кеше
    location @generate_webp {
        # Проверяем поддержку WebP
        if ($webp_support = 0) {
            # Если WebP не поддерживается - отдаем оригинал
            try_files $uri =404;
        }
        
        # Вызов скрипта конвертации через FastCGI
        # Или можно использовать модуль ngx_http_image_filter_module
        # Пример заглушки - нужно будет настроить отдельно
        try_files $uri /webp-handler.php?file=$uri;
    }

    # Защита служебных директорий Битрикс
    location ~* ^/(bitrix|local)/(modules|php_interface|stack_cache|managed_cache|sessions|tmp|templates|updates|backup|webstat|upload/1c_[^/]+) {
        deny all;
    }

    # Запрет доступа к .файлам
    location ~ /\. {
        deny all;
    }

    # Запрет выполнения PHP (CDN только для статики)
    location ~ \.php$ {
        deny all;
    }

    # Оптимизация для больших файлов
    client_max_body_size 100M;
    client_body_buffer_size 128k;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/atom+xml image/svg+xml 
               text/x-js text/x-cross-domain-policy application/x-font-ttf 
               application/x-font-opentype application/vnd.ms-fontobject 
               image/x-icon;

    # Заголовки безопасности
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS для шрифтов и изображений
    location ~* \.(eot|ttf|woff|woff2|svg)$ {
        add_header Access-Control-Allow-Origin "*";
    }
}

# Upstream для балансировки (если будет несколько CDN серверов)
