server {
    listen 80;
    server_name localhost;
    
    # Root directory with test images
    root /mnt/bitrix;
    
    # Logging
    access_log /var/log/nginx/cdn.access.log;
    error_log /var/log/nginx/cdn.error.log warn;

    # Health check endpoint
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }

    # Status page for monitoring
    location /nginx_status {
        stub_status;
        allow all;
    }

    # Process images - simplified for testing
    location ~* \.(jpg|jpeg|png|gif)$ {
        # Cache headers
        expires 1y;
        add_header Cache-Control "public";
        add_header X-CDN "Bitrix CDN Test";
        
        # Try to serve file directly
        try_files $uri =404;
    }

    # Default location
    location / {
        try_files $uri $uri/ =404;
        autoindex on;  # Enable directory listing for testing
    }
}